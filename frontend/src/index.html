<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar__brand">
      <span class="navbar__icon">🍳</span>
      <span class="navbar__name">Kitchen Quest</span>
    </div>
    <div class="navbar__links">
      <a href="#" class="navbar__link navbar__link--active">Recetas</a>
      <a href="#" class="navbar__link">Menú semanal</a>
      <a href="#" class="navbar__link">Mercado</a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- Header de sección -->
    <header class="section-header">
      <div>
        <h1 class="section-header__title">Mis Recetas</h1>
        <p class="section-header__subtitle">3 recetas guardadas</p>
      </div>
      <button class="btn btn--primary">+ Nueva receta</button>
    </header>

    <!-- Grid de tarjetas -->
    <div class="recipes-grid">

      <!-- Tarjeta de receta -->
      <article class="recipe-card">
        <div class="recipe-card__header">
          <h2 class="recipe-card__name">Avena Proteica Matutina</h2>
          <span class="recipe-card__portions">2 porciones</span>
        </div>

        <div class="macro-bar">
          <div class="macro-bar__segment macro-bar__segment--protein"  style="flex: 44"></div>
          <div class="macro-bar__segment macro-bar__segment--carbs"    style="flex: 88"></div>
          <div class="macro-bar__segment macro-bar__segment--fat"      style="flex: 9"></div>
        </div>

        <div class="macro-grid">
          <div class="macro-item">
            <span class="macro-item__value macro-item__value--calories">299</span>
            <span class="macro-item__label">kcal</span>
          </div>
          <div class="macro-item">
            <span class="macro-item__value macro-item__value--protein">22g</span>
            <span class="macro-item__label">proteína</span>
          </div>
          <div class="macro-item">
            <span class="macro-item__value macro-item__value--carbs">44g</span>
            <span class="macro-item__label">carbos</span>
          </div>
          <div class="macro-item">
            <span class="macro-item__value macro-item__value--fat">4.7g</span>
            <span class="macro-item__label">grasa</span>
          </div>
        </div>

        <div class="recipe-card__footer">
          <span class="recipe-card__tag">🌅 Desayuno</span>
          <button class="btn btn--ghost btn--sm">Ver receta →</button>
        </div>
      </article>

      <!-- Repite la tarjeta con tu "Comida Clásica" -->
      <article class="recipe-card">
        <div class="recipe-card__header">
          <h2 class="recipe-card__name">Comida Clásica</h2>
          <span class="recipe-card__portions">3 porciones</span>
        </div>

        <div class="macro-bar">
          <div class="macro-bar__segment macro-bar__segment--protein"  style="flex: 54"></div>
          <div class="macro-bar__segment macro-bar__segment--carbs"    style="flex: 96"></div>
          <div class="macro-bar__segment macro-bar__segment--fat"      style="flex: 25"></div>
        </div>

        <div class="macro-grid">
          <div class="macro-item">
            <span class="macro-item__value macro-item__value--calories">318</span>
            <span class="macro-item__label">kcal</span>
          </div>
          <div class="macro-item">
            <span class="macro-item__value macro-item__value--protein">18g</span>
            <span class="macro-item__label">proteína</span>
          </div>
          <div class="macro-item">
            <span class="macro-item__value macro-item__value--carbs">32g</span>
            <span class="macro-item__label">carbos</span>
          </div>
          <div class="macro-item">
            <span class="macro-item__value macro-item__value--fat">8.4g</span>
            <span class="macro-item__label">grasa</span>
          </div>
        </div>

        <div class="recipe-card__footer">
          <span class="recipe-card__tag">🍽️ Almuerzo</span>
          <button class="btn btn--ghost btn--sm">Ver receta →</button>
        </div>
      </article>

      <!-- Tarjeta para agregar nueva receta -->
      <article class="recipe-card recipe-card--empty">
        <span class="recipe-card__empty-icon">+</span>
        <p class="recipe-card__empty-text">Agregar receta</p>
      </article>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
