<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar__brand">
      <span class="navbar__icon">🍳</span>
      <span class="navbar__name">Kitchen Quest</span>
    </div>
    <div class="navbar__links">
      <a href="#" class="navbar__link navbar__link--active">Recetas</a>
      <a href="#" class="navbar__link">Menú semanal</a>
      <a href="#" class="navbar__link">Mercado</a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- Header de sección -->
    <header class="section-header">
      <div>
        <h1 class="section-header__title">Mis Recetas</h1>
        <p class="section-header__subtitle" id="recipe-count">0 recetas guardadas</p>
      </div>
      <button class="btn btn--primary">+ Nueva receta</button>
    </header>

    <!-- Grid de tarjetas -->
    <div class="recipes-grid" id="recipes-grid">

    </div>
  </main>

  <script src="app.js"></script>
    <!-- Modal nueva receta -->
    <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <div class="modal__header">
        <h2 class="modal__title">Nueva Receta</h2>
        <button class="modal__close" id="modal-close">✕</button>
        </div>

        <div class="modal__body">
        <div class="form-group">
            <label class="form-label">Nombre de la receta</label>
            <input class="form-input" type="text" id="recipe-name" placeholder="Ej: Bowl de quinoa">
        </div>

        <div class="form-group">
            <label class="form-label">Porciones</label>
            <input class="form-input" type="number" id="recipe-portions" value="1" min="1">
        </div>

        <div class="form-group">
            <label class="form-label">Categoría</label>
            <select class="form-input" id="recipe-tag">
            <option value="🌅 Desayuno">🌅 Desayuno</option>
            <option value="🍽️ Almuerzo">🍽️ Almuerzo</option>
            <option value="🌙 Cena">🌙 Cena</option>
            <option value="🥪 Snack">🥪 Snack</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Ingredientes</label>
            <div id="ingredients-list"></div>
            <button class="btn btn--ghost btn--sm" id="add-ingredient-btn" style="margin-top:8px">
            + Agregar ingrediente
            </button>
        </div>
        </div>

        <div class="modal__footer">
        <button class="btn btn--ghost" id="cancel-btn">Cancelar</button>
        <button class="btn btn--primary" id="save-recipe-btn">Guardar receta</button>
        </div>
    </div>
    </div>
</body>
</html>
